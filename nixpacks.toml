# Railway/Nixpacks: Node-only SSR app (TanStack Start + Nitro).
# bun.lock in repo would otherwise pull in Bun + Caddy static-site setup.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
